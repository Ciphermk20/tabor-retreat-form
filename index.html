<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabor Ashram Registration Form</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#f3f4f6] font-sans text-gray-800 antialiased selection:bg-purple-200 selection:text-purple-900">

    <div class="min-h-screen flex flex-col items-center py-12 px-4">
        
        <div class="mb-8">
            <img src="logo.jpg" alt="Tabor Ashram Logo" class="h-24 w-24 rounded-full shadow-md object-cover border-2 border-white">
        </div>

        <div id="formContainer" class="bg-white w-full max-w-5xl rounded-xl shadow-[0_8px_30px_rgb(0,0,0,0.04)] p-8 md:p-10 border border-gray-100">
            
            <h2 class="text-3xl font-bold text-center text-black mb-10">Tabor Ashram Registration Form</h2>

            <form id="taborForm" class="space-y-6">
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-semibold text-gray-800 mb-1">Full Name <span class="text-red-500">*</span></label>
                        <input type="text" id="fullName" placeholder="John Smith" class="w-full border border-gray-300 rounded-md p-2.5 text-sm focus:ring-2 focus:ring-purple-700 focus:border-purple-700 outline-none" required>
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-800 mb-1">DOB <span class="text-red-500">*</span></label>
                        <input type="date" id="dob" class="w-full border border-gray-300 rounded-md p-2.5 text-sm focus:ring-2 focus:ring-purple-700 focus:border-purple-700 outline-none" required>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <div>
                        <label class="block text-sm font-semibold text-gray-800 mb-1">Phone Number <span class="text-red-500">*</span></label>
                        <div class="flex border border-gray-300 rounded-md overflow-hidden focus-within:ring-2 focus-within:ring-purple-700 focus-within:border-purple-700">
                            <span class="bg-gray-50 text-gray-600 px-3 py-2.5 border-r border-gray-300 text-sm font-medium">+91</span>
                            <input type="tel" id="phone" placeholder="9096471356" pattern="[0-9]{10}" class="w-full p-2.5 text-sm outline-none" required>
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-800 mb-1">Email <span class="text-red-500">*</span></label>
                        <input type="email" id="email" placeholder="example@email.com" class="w-full border border-gray-300 rounded-md p-2.5 text-sm focus:ring-2 focus:ring-purple-700 focus:border-purple-700 outline-none" required>
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-800 mb-1">Aadhar Number <span class="text-red-500">*</span></label>
                        <input type="text" id="aadhar" class="w-full border border-gray-300 rounded-md p-2.5 text-sm focus:ring-2 focus:ring-purple-700 focus:border-purple-700 outline-none" required>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-semibold text-gray-800 mb-1">Language <span class="text-red-500">*</span></label>
                        <select id="language" class="w-full border border-gray-300 rounded-md p-2.5 text-sm bg-white focus:ring-2 focus:ring-purple-700 focus:border-purple-700 outline-none" required>
                            <option value="">Select a Language</option>
                            <option value="English">English</option>
                            <option value="Malayalam">Malayalam</option>
                            <option value="Hindi">Hindi</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-800 mb-1">Retreat <span class="text-red-500">*</span></label>
                        <select id="retreat" class="w-full border border-gray-300 rounded-md p-2.5 text-sm bg-white focus:ring-2 focus:ring-purple-700 focus:border-purple-700 outline-none" required>
                            <option value="">Select a Retreat</option>
                            <option value="Inner Healing">Inner Healing Retreat</option>
                            <option value="Growth">National Growth Retreat</option>
                        </select>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-semibold text-gray-800 mb-1">Any diseases? (if any please specify)</label>
                        <textarea id="diseases" rows="2" placeholder="Please mention if any physical or mental conditions, medications, or allergies" class="w-full border border-gray-300 rounded-md p-2.5 text-sm focus:ring-2 focus:ring-purple-700 focus:border-purple-700 outline-none resize-none"></textarea>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-semibold text-gray-800 mb-1">Retreat Start Date</label>
                            <input type="date" id="startDate" class="w-full border border-gray-300 rounded-md p-2.5 text-sm focus:ring-2 focus:ring-purple-700 outline-none">
                        </div>
                        <div>
                            <label class="block text-sm font-semibold text-gray-800 mb-1">Retreat End Date</label>
                            <input type="date" id="endDate" class="w-full border border-gray-300 rounded-md p-2.5 text-sm focus:ring-2 focus:ring-purple-700 outline-none">
                        </div>
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-semibold text-gray-800 mb-1">Retreat Venue</label>
                    <input type="text" id="venue" class="w-full border border-gray-300 rounded-md p-2.5 text-sm focus:ring-2 focus:ring-purple-700 outline-none">
                </div>

                <div class="flex items-center mt-2">
                    <input type="checkbox" id="addParticipants" class="w-4 h-4 text-purple-700 border-gray-300 rounded focus:ring-purple-700 cursor-pointer">
                    <label for="addParticipants" class="ml-2 text-sm text-gray-800 cursor-pointer">I wish to add more participants.</label>
                </div>

                <div>
                    <label class="block text-sm font-semibold text-gray-800 mb-1">Address <span class="text-red-500">*</span></label>
                    <textarea id="address" rows="3" placeholder="123, Buffalo Street NY, USA" class="w-full border border-gray-300 rounded-md p-2.5 text-sm focus:ring-2 focus:ring-purple-700 outline-none resize-none" required></textarea>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6 items-start">
                    <div>
                        <label class="block text-sm font-semibold text-gray-800 mb-1">Emergency Contact Name <span class="text-red-500">*</span></label>
                        <input type="text" id="emergencyName" placeholder="Enter emergency contact full name" class="w-full border border-gray-300 rounded-md p-2.5 text-sm focus:ring-2 focus:ring-purple-700 outline-none" required>
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-800 mb-1">Emergency Contact Address <span class="text-red-500">*</span></label>
                        <textarea id="emergencyAddress" rows="2" placeholder="Enter emergency contact address" class="w-full border border-gray-300 rounded-md p-2.5 text-sm focus:ring-2 focus:ring-purple-700 outline-none resize-none" required></textarea>
                    </div>
                </div>

               <div class="flex items-center mt-2">
                    <input type="checkbox" id="addParticipants" class="w-4 h-4 text-purple-700 border-gray-300 rounded focus:ring-purple-700 cursor-pointer">
                    <label for="addParticipants" class="ml-2 text-sm font-semibold text-gray-800 cursor-pointer">I wish to add more participants.</label>
                </div>

                <div id="extraParticipantsContainer" class="hidden space-y-4 border-l-4 border-purple-600 pl-4 mt-4">
                    </div>

                <div class="pt-4">
                    <button type="submit" id="submitBtn" class="bg-[#4B128E] hover:bg-[#3a0d6e] text-white font-bold py-3 px-8 rounded-full shadow-md transition duration-200 text-sm tracking-wide w-full md:w-auto">
                        REGISTER
                    </button>
                </div>
            </form>
        </div>

        <div id="successMessage" class="hidden bg-white w-full max-w-2xl rounded-xl shadow-lg p-10 text-center border-t-4 border-green-500 mt-10">
            <svg class="w-20 h-20 text-green-500 mx-auto mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
            <h2 class="text-3xl font-bold text-gray-800 mb-4">Registration Successful!</h2>
            <p class="text-gray-600 mb-6">Thank you for registering for the retreat. Your details have been securely saved.</p>
            <button onclick="window.location.reload()" class="bg-[#4B128E] hover:bg-[#3a0d6e] text-white font-bold py-2 px-6 rounded-full transition duration-200">Submit Another Form</button>
        </div>

    </div>

    <script>
        const GOOGLE_SCRIPT_URL = "YOUR_NEW_APPS_SCRIPT_URL_HERE";

        // --- DYNAMIC PARTICIPANTS LOGIC ---
        const addParticipantsCheckbox = document.getElementById('addParticipants');
        const extraContainer = document.getElementById('extraParticipantsContainer');

        // Toggle visibility when checkbox is clicked
        addParticipantsCheckbox.addEventListener('change', function() {
            if (this.checked) {
                extraContainer.classList.remove('hidden');
                // Automatically add the first empty block if the container is empty
                if (extraContainer.children.length === 0) {
                    addParticipantBlock();
                }
            } else {
                extraContainer.classList.add('hidden');
                extraContainer.innerHTML = ''; // Clear out data if unchecked
            }
        });

        // Function to create and inject a new participant block
        function addParticipantBlock() {
            const block = document.createElement('div');
            block.className = "participant-block bg-gray-50 p-4 border border-gray-200 rounded-lg relative";
            
            block.innerHTML = `
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                    <div>
                        <label class="block text-sm font-semibold text-gray-800 mb-1">Full Name</label>
                        <input type="text" class="extra-name w-full border border-gray-300 rounded-md p-2.5 text-sm outline-none focus:border-purple-700" required>
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-800 mb-1">DOB</label>
                        <input type="date" class="extra-dob w-full border border-gray-300 rounded-md p-2.5 text-sm outline-none focus:border-purple-700" required>
                    </div>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 items-end">
                    <div>
                        <label class="block text-sm font-semibold text-gray-800 mb-1">Aadhar Number</label>
                        <input type="text" class="extra-aadhar w-full border border-gray-300 rounded-md p-2.5 text-sm outline-none focus:border-purple-700" required>
                    </div>
                    <div class="flex gap-2">
                        <div class="flex-grow">
                            <label class="block text-sm font-semibold text-gray-800 mb-1">Phone Number</label>
                            <input type="tel" class="extra-phone w-full border border-gray-300 rounded-md p-2.5 text-sm outline-none focus:border-purple-700" placeholder="+91 " required>
                        </div>
                        
                        <div class="flex gap-2 pb-0.5">
                            <button type="button" class="add-btn h-[42px] w-[42px] flex items-center justify-center border-2 border-green-600 rounded-md hover:bg-green-50 transition">
                                <svg class="w-5 h-5 text-black" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                            </button>
                            <button type="button" class="delete-btn h-[42px] w-[42px] flex items-center justify-center border-2 border-red-600 rounded-md hover:bg-red-50 transition">
                                <svg class="w-5 h-5 text-gray-600" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M9 2a1 1 0 00-.894.553L7.382 4H4a1 1 0 000 2v10a2 2 0 002 2h8a2 2 0 002-2V6a1 1 0 100-2h-3.382l-.724-1.447A1 1 0 0011 2H9zM7 8a1 1 0 012 0v6a1 1 0 11-2 0V8zm5-1a1 1 0 00-1 1v6a1 1 0 102 0V8a1 1 0 00-1-1z" clip-rule="evenodd"></path></svg>
                            </button>
                        </div>
                    </div>
                </div>
            `;

            // Attach event listener to the NEW [+] button
            block.querySelector('.add-btn').addEventListener('click', addParticipantBlock);

            // Attach event listener to the NEW [Trash] button
            block.querySelector('.delete-btn').addEventListener('click', function() {
                if (extraContainer.children.length > 1) {
                    block.remove(); // Delete this specific row
                } else {
                    // If it's the last row, uncheck the box and hide everything
                    extraContainer.innerHTML = '';
                    addParticipantsCheckbox.checked = false;
                    extraContainer.classList.add('hidden');
                }
            });

            extraContainer.appendChild(block);
        }

        // --- FORM SUBMISSION LOGIC ---
        document.getElementById('taborForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const submitBtn = document.getElementById('submitBtn');
            const originalText = submitBtn.innerText;
            submitBtn.innerText = "Processing...";
            submitBtn.disabled = true;
            submitBtn.classList.add("opacity-70", "cursor-not-allowed");

            try {
                const formData = new FormData();
                
                // 1. Gather Standard Fields
                formData.append("fullName", document.getElementById('fullName').value);
                formData.append("dob", document.getElementById('dob').value);
                formData.append("phone", "+91 " + document.getElementById('phone').value); 
                formData.append("email", document.getElementById('email').value);
                formData.append("aadhar", document.getElementById('aadhar').value);
                formData.append("language", document.getElementById('language').value);
                formData.append("retreat", document.getElementById('retreat').value);
                formData.append("diseases", document.getElementById('diseases').value);
                formData.append("startDate", document.getElementById('startDate').value);
                formData.append("endDate", document.getElementById('endDate').value);
                formData.append("venue", document.getElementById('venue').value);
                formData.append("addParticipants", document.getElementById('addParticipants').checked ? "Yes" : "No");
                formData.append("address", document.getElementById('address').value);
                formData.append("emergencyName", document.getElementById('emergencyName').value);
                formData.append("emergencyAddress", document.getElementById('emergencyAddress').value);
                formData.append("consent", document.getElementById('consent').checked ? "Yes" : "No");

                // 2. Gather DYNAMIC Extra Participants Data
                let extraParticipantsData = [];
                if (document.getElementById('addParticipants').checked) {
                    const blocks = document.querySelectorAll('.participant-block');
                    blocks.forEach(block => {
                        extraParticipantsData.push({
                            name: block.querySelector('.extra-name').value,
                            dob: block.querySelector('.extra-dob').value,
                            aadhar: block.querySelector('.extra-aadhar').value,
                            phone: block.querySelector('.extra-phone').value
                        });
                    });
                }
                
                // Convert array to a JSON string so Google Sheets can receive it safely
                formData.append("extraParticipantsList", JSON.stringify(extraParticipantsData));

                // 3. Send to Google Sheets
                const response = await fetch(GOOGLE_SCRIPT_URL, { 
                    method: "POST", 
                    body: formData 
                });
                
                const result = await response.json();

                if (result.result === "success") {
                    document.getElementById('formContainer').classList.add('hidden');
                    document.getElementById('successMessage').classList.remove('hidden');
                } else {
                    throw new Error(result.error);
                }

            } catch (error) {
                alert("An error occurred: " + error.message);
                submitBtn.innerText = originalText;
                submitBtn.disabled = false;
                submitBtn.classList.remove("opacity-70", "cursor-not-allowed");
            }
        });
    </script>
</body>
</html>
